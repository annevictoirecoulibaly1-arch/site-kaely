[phases.setup]
nixPkgs = ["ffmpeg", "python311"]

[phases.build]
cmds = [
  "pip install -r requirements.txt",
  "python manage.py collectstatic --noinput",
  "python manage.py migrate --noinput",
  "ffmpeg -version | head -1 || echo 'ffmpeg not found in PATH at build time'"
]

[start]
cmd = "python -m gunicorn Safeplace.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
