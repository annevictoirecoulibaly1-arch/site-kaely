[phases.setup]
nixPkgs = ["python311"]
aptPkgs = ["ffmpeg"]

[phases.build]
cmds = [
  "pip install -r requirements.txt",
  "python manage.py collectstatic --noinput",
  "python manage.py migrate --noinput",
  "ffmpeg -version | head -1 && echo 'FFmpeg OK' || echo 'WARNING: ffmpeg not in PATH'"
]

[start]
cmd = "python -m gunicorn Safeplace.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
